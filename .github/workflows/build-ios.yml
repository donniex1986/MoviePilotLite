name: Build iOS

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 5"   # 每周五 UTC 00:00

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.2"
          channel: "stable"
          cache: true

      - name: Cache Flutter pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ios/Pods
            ~/Library/Caches/CocoaPods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install CocoaPods
        run: |
          cd ios
          pod install
          cd ..

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: *//' | sed 's/+.*//' | tr -d ' ')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Generate release name
        id: release
        run: |
          BUILD_DATE=$(date +%Y-%m-%d)
          RELEASE_NAME="v${{ steps.version.outputs.version }}-ios-${BUILD_DATE}"
          IPA_NAME="MoviePilot-iOS-v${{ steps.version.outputs.version }}-${BUILD_DATE}-unsigned.ipa"

          echo "name=$RELEASE_NAME" >> $GITHUB_OUTPUT
          echo "date=$BUILD_DATE" >> $GITHUB_OUTPUT
          echo "ipa_name=$IPA_NAME" >> $GITHUB_OUTPUT

      - name: Build iOS (Unsigned)
        run: |
          flutter build ios --release --no-codesign --dart-define=FLUTTER_APP_ENV=release

          cd build/ios/iphoneos

          mkdir -p Payload
          cp -R Runner.app Payload/

          zip -r -y "${{ steps.release.outputs.ipa_name }}" Payload
          shasum -a 256 "${{ steps.release.outputs.ipa_name }}" > "${{ steps.release.outputs.ipa_name }}.sha256"

          cd ../../..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.name }}
          name: ${{ steps.release.outputs.name }}
          body: |
            ## MoviePilot iOS Release

            - Version: ${{ steps.version.outputs.version }}
            - Build Date: ${{ steps.release.outputs.date }}
            - Type: Unsigned IPA

            ### ⚠️ Installation

            This IPA is **unsigned**.

            Please sign it using your own Apple Developer account via:

            - AltStore
            - Sideloadly
            - Xcode

            Free Apple ID accounts expire after 7 days.
          files: |
            build/ios/iphoneos/${{ steps.release.outputs.ipa_name }}
            build/ios/iphoneos/${{ steps.release.outputs.ipa_name }}.sha256
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Telegram 通知
        if: ${{ success() }}
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TG_CHAT_ID }}
          token: ${{ secrets.TG_BOT_TOKEN }}
          format: html
          disable_web_page_preview: true
          message: |
            <b>🎬 MoviePilot iOS 构建完成</b>

            <b>Release:</b> <code>${{ steps.release.outputs.name }}</code>
            <b>版本:</b> ${{ steps.version.outputs.version }}
            <b>日期:</b> ${{ steps.release.outputs.date }}
            <b>文件:</b> <code>${{ steps.release.outputs.ipa_name }}</code>

            <b>说明:</b> Unsigned IPA，需通过 AltStore / Sideloadly / Xcode 自行签名安装。

            <a href="https://github.com/${{ github.repository }}/releases/tag/${{ steps.release.outputs.name }}">📦 查看 Release</a>
            <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}">🔗 Workflow 运行</a>
