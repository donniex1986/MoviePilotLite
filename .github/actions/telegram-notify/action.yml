name: Telegram Notify

description: 通过 Telegram Bot 发送通知消息

inputs:
  token:
    description: "Telegram Bot Token"
    required: true
  chat_id:
    description: "接收消息的 Chat ID"
    required: true
  message:
    description: "要发送的消息内容（支持 HTML）"
    required: true
  file_paths:
    description: "要发送的附件路径，支持多行"
    required: false
    default: ""
  file_urls:
    description: "要发送的附件 URL，支持多行"
    required: false
    default: ""
  parse_mode:
    description: "解析模式：HTML 或 Markdown"
    required: false
    default: "HTML"
  disable_notification:
    description: "是否静默发送"
    required: false
    default: "false"

outputs:
  success:
    description: "是否发送成功"
    value: ${{ steps.send.outputs.success }}

runs:
  using: composite
  steps:
    - name: Send Telegram message
      id: send
      shell: bash
      env:
        TOKEN: ${{ inputs.token }}
        CHAT_ID: ${{ inputs.chat_id }}
        MESSAGE: ${{ inputs.message }}
        FILE_PATHS: ${{ inputs.file_paths }}
        FILE_URLS: ${{ inputs.file_urls }}
        PARSE_MODE: ${{ inputs.parse_mode }}
        DISABLE_NOTIFICATION: ${{ inputs.disable_notification }}
      run: |
        set -euo pipefail
        if [ -z "${TOKEN:-}" ] || [ -z "${CHAT_ID:-}" ]; then
          echo "::warning::TG_BOT_TOKEN 或 TG_CHAT_ID 未配置，跳过通知"
          echo "success=false" >> $GITHUB_OUTPUT
          exit 0
        fi
        disable=$([ "$DISABLE_NOTIFICATION" = "true" ] && echo "true" || echo "false")

        mapfile -t files < <(printf '%s\n' "${FILE_PATHS:-}" | sed '/^[[:space:]]*$/d')
        mapfile -t urls < <(printf '%s\n' "${FILE_URLS:-}" | sed '/^[[:space:]]*$/d')
        valid_files=()
        for file in "${files[@]}"; do
          if [ -f "$file" ]; then
            valid_files+=("$file")
          else
            echo "::warning::附件不存在，跳过: $file"
          fi
        done
        valid_urls=()
        for url in "${urls[@]}"; do
          if [ -n "$url" ]; then
            valid_urls+=("$url")
          fi
        done

        send_message() {
          payload=$(jq -n \
            --arg chat_id "$CHAT_ID" \
            --arg text "$MESSAGE" \
            --arg parse_mode "$PARSE_MODE" \
            --argjson disable "$disable" \
            '{chat_id: $chat_id, text: $text, parse_mode: $parse_mode, disable_notification: $disable}')
          curl -s -w "\n%{http_code}" -X POST \
            "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$payload" || true
        }

        send_single_document() {
          local target="$1"
          local is_url="${2:-false}"
          local document_field="$target"
          if [ "$is_url" != "true" ]; then
            document_field="@${target}"
          fi
          curl -s -w "\n%{http_code}" -X POST \
            "https://api.telegram.org/bot${TOKEN}/sendDocument" \
            -F "chat_id=${CHAT_ID}" \
            -F "caption=${MESSAGE}" \
            -F "parse_mode=${PARSE_MODE}" \
            -F "disable_notification=${disable}" \
            -F "document=${document_field}" || true
        }

        send_url_media_group() {
          local media_json="[]"
          local payload
          local index=0
          for url in "${valid_urls[@]}"; do
            if [ "$index" -eq 0 ]; then
              media_json=$(jq -c \
                --argjson media "$media_json" \
                --arg media_url "$url" \
                --arg caption "$MESSAGE" \
                --arg parse_mode "$PARSE_MODE" \
                '$media + [{type:"document", media:$media_url, caption:$caption, parse_mode:$parse_mode}]')
            else
              media_json=$(jq -c \
                --argjson media "$media_json" \
                --arg media_url "$url" \
                '$media + [{type:"document", media:$media_url}]')
            fi
            index=$((index + 1))
          done

          payload=$(jq -cn \
            --arg chat_id "$CHAT_ID" \
            --argjson media "$media_json" \
            --argjson disable "$disable" \
            '{chat_id: $chat_id, media: $media, disable_notification: $disable}')

          curl -s -w "\n%{http_code}" -X POST \
            "https://api.telegram.org/bot${TOKEN}/sendMediaGroup" \
            -H "Content-Type: application/json" \
            -d "$payload" || true
        }

        append_url_links() {
          local links=""
          for url in "${valid_urls[@]}"; do
            filename=$(basename "${url%%\?*}")
            links="${links}\n<a href=\"${url}\">${filename}</a>"
          done
          printf '%b' "$links"
        }

        send_media_group() {
          local media_json="[]"
          local curl_args=()
          local index=0
          for file in "${valid_files[@]}"; do
            attach_name="file${index}"
            if [ "$index" -eq 0 ]; then
              media_json=$(jq -c \
                --argjson media "$media_json" \
                --arg attach "attach://${attach_name}" \
                --arg caption "$MESSAGE" \
                --arg parse_mode "$PARSE_MODE" \
                '$media + [{type:"document", media:$attach, caption:$caption, parse_mode:$parse_mode}]')
            else
              media_json=$(jq -c \
                --argjson media "$media_json" \
                --arg attach "attach://${attach_name}" \
                '$media + [{type:"document", media:$attach}]')
            fi
            curl_args+=(-F "${attach_name}=@${file}")
            index=$((index + 1))
          done

          if [ "$index" -eq 0 ]; then
            send_message
            return
          fi

          curl -s -w "\n%{http_code}" -X POST \
            "https://api.telegram.org/bot${TOKEN}/sendMediaGroup" \
            -F "chat_id=${CHAT_ID}" \
            -F "disable_notification=${disable}" \
            -F "media=${media_json}" \
            "${curl_args[@]}" || true
        }

        if [ "${#valid_urls[@]}" -gt 1 ]; then
          resp=$(send_url_media_group)
          http_code=$(echo "$resp" | tail -n1)
          if [ "$http_code" != "200" ]; then
            fallback_message="${MESSAGE}$(append_url_links)"
            payload=$(jq -n \
              --arg chat_id "$CHAT_ID" \
              --arg text "$fallback_message" \
              --arg parse_mode "$PARSE_MODE" \
              --argjson disable "$disable" \
              '{chat_id: $chat_id, text: $text, parse_mode: $parse_mode, disable_notification: $disable}')
            resp=$(curl -s -w "\n%{http_code}" -X POST \
              "https://api.telegram.org/bot${TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "$payload" || true)
          fi
        elif [ "${#valid_urls[@]}" -eq 1 ]; then
          resp=$(send_single_document "${valid_urls[0]}" true)
        elif [ "${#valid_files[@]}" -eq 0 ]; then
          resp=$(send_message)
        elif [ "${#valid_files[@]}" -eq 1 ]; then
          resp=$(send_single_document "${valid_files[0]}")
        else
          resp=$(send_media_group)
        fi

        http_code=$(echo "$resp" | tail -n1)
        body=$(echo "$resp" | sed '$d')
        if [ "$http_code" = "200" ]; then
          echo "success=true" >> $GITHUB_OUTPUT
          echo "Telegram 通知已发送"
        else
          echo "success=false" >> $GITHUB_OUTPUT
          echo "::warning::Telegram 发送失败 (HTTP $http_code): $body"
        fi
